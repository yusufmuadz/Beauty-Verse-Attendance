name: lancar_cat
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  camera: ^0.11.2
  flutter_face_api: ^7.2.391
  iconsax_flutter: ^1.0.1
  google_fonts: ^6.3.0
  gap: ^3.0.1
  intl: ^0.20.2
  hexcolor: ^3.0.1
  carousel_slider: ^5.1.1
  path_provider: ^2.1.5
  geolocator: ^14.0.2
  flutter_map_location_marker: ^10.1.0
  http: ^1.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  geocoding: ^4.0.0
  flutter_custom_month_picker: ^0.1.3
  another_stepper: ^1.2.2
  image_picker: ^1.2.0
  file_picker: ^10.3.2
  cached_network_image: ^3.4.1
  skeletonizer: ^2.1.0+1
  open_file: ^3.5.10
  permission_handler: ^11.4.0
  flutter_image_compress: ^2.4.0
  flutter_localization: ^0.3.3
  flutter_launcher_icons: ^0.14.4
  image_cropper: ^11.0.0
  url_launcher: ^6.3.2
  table_calendar: ^3.2.0
  datetime_setting: ^2.0.3
  detect_fake_location: ^2.3.0
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  firebase_messaging: ^16.0.0
  badges: ^3.1.2
  jailbreak_root_detection: ^1.1.6
  connectivity_plus: ^7.0.0
  animated_text_kit: ^4.2.3
  version: ^3.0.2
  flutter_image_stack: ^0.0.7
  timeline_tile: ^2.0.0
  dio: ^5.9.0
  firebase_core: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  hive_generator: any
  build_runner: any

flutter:
  uses-material-design: true
  assets:
    - assets/banner/
    - assets/images/
    - assets/icons/
    - assets/logo/
    - assets/gif/

flutter_icons:
  image_path: assets/logo/logo_.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/logo/logo_.png
  remove_alpha_ios: true
  android: true
  ios: true
